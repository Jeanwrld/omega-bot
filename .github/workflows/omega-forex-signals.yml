name: OMEGA Forex Hourly Signals

on:
  schedule:
    - cron: '5 * * * *'
  workflow_dispatch:

jobs:
  run-signals:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-omega-forex-v3

      - name: Install dependencies
        run: |
          pip install numpy==1.26.4
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install  scikit-learn requests huggingface_hub pandas-ta-classic

      - name: Run OMEGA Forex signal generator
        env:
          TWELVE_DATA_API_KEY:   ${{ secrets.TWELVE_DATA_API_KEY }}
          HF_TOKEN:              ${{ secrets.HF_TOKEN }}
          DISCORD_WEBHOOK_FOREX: ${{ secrets.DISCORD_WEBHOOK_FOREX }}
        run: python omega_forex/run.py