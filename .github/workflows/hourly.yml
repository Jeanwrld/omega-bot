name: OMEGA v3 Hourly Signals

on:
  schedule:
    - cron: '0 * * * *'   # every hour on the hour
  workflow_dispatch:        # manual trigger button in GitHub UI

jobs:
  run-signals:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # needed to commit the log CSV back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-omega

      - name: Install dependencies
        run: |
          pip install numpy==1.26.4
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install ccxt pandas_ta scikit-learn requests huggingface_hub pandas

      - name: Run OMEGA signal generator
        env:
          POLYGON_KEY: ${{ secrets.POLYGON_KEY }}
          HF_TOKEN:    ${{ secrets.HF_TOKEN }}
        run: python omega/run.py

      - name: Commit updated logs
        run: |
          git config user.name  "OMEGA Bot"
          git config user.email "omega@noreply.github.com"
          git add signals_log.csv entry_prices.json || true
          git diff --staged --quiet || git commit -m "📡 Signals $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
