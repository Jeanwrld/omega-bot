name: OMEGA v7 Hourly Signals

on:
  schedule:
    - cron: '10 * * * *'  # every hour at :10 (after v3 :00 and Forex :05)
  workflow_dispatch:       # manual trigger button in GitHub UI

jobs:
  run-signals:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # needed to commit log CSV + entry JSON back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-omega-v7

      - name: Install dependencies
        run: |
          pip install numpy==1.26.4
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install scikit-learn requests huggingface_hub pandas-ta-classic

      - name: Run OMEGA v7 signal generator
        env:
          HF_TOKEN:              ${{ secrets.HF_TOKEN }}
          DISCORD_WEBHOOK_FOREX: ${{ secrets.DISCORD_WEBHOOK_FOREX }}
        run: python omega_v7/run.py

      - name: Commit updated logs
        run: |
           git config user.name  "OMEGA v7 Bot"
           git config user.email "omega-v7@noreply.github.com"
           git pull --rebase
           git add omega_v7_all_signals.csv   || true
           git add omega_v7_entry_prices.json || true
           git add omega_v7_signals_log.csv   || true
           git diff --staged --quiet || (git commit -m "📡 v7 Signals $(date -u '+%Y-%m-%d %H:%M') UTC" && git push)