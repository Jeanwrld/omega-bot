name: Keep HF Spaces Alive

on:
  schedule:
    - cron: '0 12 * * *'  # every day at 12:00 UTC
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping lie-to-me
        run: curl -s -o /dev/null -w "%{http_code}" https://sato2ru-lie-to-me.hf.space

      - name: Ping wordle
        run: curl -s -o /dev/null -w "%{http_code}" https://sato2ru-wordle.hf.space